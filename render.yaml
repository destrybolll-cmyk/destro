services:
  - type: web
    name: cookie-anon-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DB_PATH
        value: /data/bot.db
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
