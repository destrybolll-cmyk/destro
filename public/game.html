<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Пинг-Понг</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column;align-items:center;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
.game-wrapper{position:relative;width:100%;max-width:500px;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:8px}
canvas{width:100%;max-width:500px;aspect-ratio:500/700;background:#161b22;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.4);display:block;touch-action:none}
.score{display:flex;justify-content:space-between;width:100%;max-width:500px;padding:8px 16px;font-size:18px;font-weight:700}
.score span{color:#8b949e}
.score .player{color:#58a6ff}
.score .ai{color:#f85149}
.overlay,.lobby{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,17,23,.85);border-radius:16px;z-index:10;gap:12px;padding:20px;text-align:center}
.overlay h2,.lobby h2{font-size:24px;margin-bottom:4px}
.overlay .score-final{font-size:20px;color:#8b949e;margin-bottom:8px}
.overlay button,.lobby button{background:#238636;color:#fff;border:none;border-radius:8px;padding:12px 32px;font-size:16px;font-weight:600;cursor:pointer;touch-action:manipulation;width:100%;max-width:280px}
.overlay button:active,.lobby button:active{background:#1e7a30}
.overlay .close-btn,.lobby .secondary{background:#30363d}
.overlay .close-btn:active,.lobby .secondary:active{background:#21262d}
.lobby input{background:#21262d;color:#fff;border:1px solid #30363d;border-radius:8px;padding:10px 16px;font-size:16px;width:100%;max-width:280px;text-align:center;outline:none}
.lobby input:focus{border-color:#58a6ff}
.lobby .hint{color:#8b949e;font-size:13px;max-width:280px}
.lobby .sep{color:#30363d;font-size:14px;margin:4px 0}
.countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;font-size:72px;font-weight:900;color:#58a6ff;background:rgba(13,17,23,.7);border-radius:16px}
.hidden{display:none}
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="score">
    <span class="player" id="playerLabel">Вы: <b id="playerScore">0</b></span>
    <span id="gameModeText">⚔️</span>
    <span class="ai" id="opponentLabel">Соперник: <b id="aiScore">0</b></span>
  </div>
  <div style="position:relative;width:100%;max-width:500px">
    <canvas id="gameCanvas" width="500" height="700"></canvas>
    <div id="countdown" class="countdown hidden">3</div>
    <div id="gameOver" class="overlay hidden">
      <h2 id="resultTitle">🏓 Игра окончена</h2>
      <div class="score-final" id="finalScore">0:0</div>
      <button id="closeBtn" class="close-btn">❌ Закрыть</button>
    </div>
    <div id="waitingOverlay" class="overlay hidden">
      <h2>⏳ Ожидание соперника...</h2>
      <p style="color:#8b949e">Подключаемся к игре</p>
    </div>
    <div id="lobby" class="lobby">
      <h2>🏓 Пинг-Понг</h2>
      <button id="btnAI">🤖 Против AI</button>
      <div class="sep">— или —</div>
      <button id="btnCookie">👑 Против Cookie</button>
      <div class="sep">— или —</div>
      <input id="challengeInput" type="number" placeholder="ID пользователя" inputmode="numeric">
      <button id="btnChallenge" class="secondary">🎯 Вызвать по ID</button>
      <div class="hint">Введи номер пользователя (например 5) и нажми «Вызвать»</div>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=500,H=700;
const PADDLE_W=10,PADDLE_H=80,BALL_R=8,SPEED_INIT=4;
const WIN_SCORE=7;

const params=new URLSearchParams(window.location.search);
const roomId=params.get('room');
const side=params.get('side')||'left';
const isMultiplayer=!!roomId;

let playerY=H/2-PADDLE_H/2,aiY=H/2-PADDLE_H/2;
let ballX=W/2,ballY=H/2,bSpeed=SPEED_INIT,bVx=0,bVy=0;
let playerScore=0,aiScore=0;
let gameRunning=false,gameStarted=false;
let targetPlayerY=H/2-PADDLE_H/2;
let ws=null;

// Telegram WebApp
let tg=null;
try{
  if(window.TelegramWebviewProxy||window.Telegram){
    tg=window.Telegram.WebApp;
    tg.ready();tg.expand();
  }
}catch(e){}

function sendToBot(data){
  if(tg){try{tg.sendData(JSON.stringify(data))}catch(e){}}
}

function sendGameResult(winner){
  gameRunning=false;gameStarted=false;
  document.getElementById('finalScore').textContent=`${playerScore}:${aiScore}`;
  const title=document.getElementById('resultTitle');
  let result;
  if(winner==='player'){title.textContent='🎉 Победа!';result='win'}
  else if(winner==='ai'){title.textContent='😈 Поражение';result='lose'}
  else{title.textContent='🤝 Ничья';result='draw'}
  document.getElementById('gameOver').classList.remove('hidden');
  sendToBot({result,playerScore,aiScore});
}

// Init
if(isMultiplayer){
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('gameModeText').textContent='🏓 Cookie';
  document.getElementById('opponentLabel').innerHTML='Cookie: <b id="aiScore">0</b>';
  document.getElementById('waitingOverlay').classList.remove('hidden');
  connectWs();
} else {
  document.getElementById('gameModeText').textContent='⚔️ Режим';
  document.getElementById('opponentLabel').innerHTML='AI: <b id="aiScore">0</b>';
}

function connectWs(){
  const proto=window.location.protocol==='https:'?'wss:':'ws:';
  const url=`${proto}//${window.location.host}/ws?room=${roomId}&side=${side}`;
  ws=new WebSocket(url);
  ws.onmessage=(e)=>{
    const data=JSON.parse(e.data);
    if(data.type==='joined'){
      document.getElementById('waitingOverlay').classList.add('hidden');
    }else if(data.type==='countdown'){
      document.getElementById('countdown').textContent=data.value;
      document.getElementById('countdown').classList.remove('hidden');
    }else if(data.type==='start'){
      document.getElementById('countdown').classList.add('hidden');
      gameRunning=true;gameStarted=true;gameLoop();
    }else if(data.type==='state'){
      ballX=data.ball_x;ballY=data.ball_y;
      if(side==='left'){aiY=data.p2_y;playerScore=data.p1_score;aiScore=data.p2_score}
      else{aiY=data.p1_y;playerScore=data.p2_score;aiScore=data.p1_score}
      updateScore();
    }else if(data.type==='game_over'){
      gameRunning=false;
      const isP1=side==='left';
      const pScore=isP1?data.scores[0]:data.scores[1];
      const aScore=isP1?data.scores[1]:data.scores[0];
      playerScore=pScore;aiScore=aScore;updateScore();
      const win=(isP1&&data.winner==='p1')||(!isP1&&data.winner==='p2');
      document.getElementById('finalScore').textContent=`${pScore}:${aScore}`;
      document.getElementById('resultTitle').textContent=win?'🎉 Победа!':'😈 Поражение';
      document.getElementById('gameOver').classList.remove('hidden');
      sendToBot({result:win?'win':'lose',playerScore:pScore,aiScore:aScore});
    }else if(data.type==='error'){
      document.getElementById('waitingOverlay').innerHTML=`<h2>❌ Ошибка</h2><p>${data.msg}</p>`;
    }
  };
}

function updateScore(){
  document.getElementById('playerScore').textContent=playerScore;
  document.getElementById('aiScore').textContent=aiScore;
}

// ─── Lobby buttons ───
document.getElementById('btnAI').addEventListener('click',()=>{
  document.getElementById('lobby').classList.add('hidden');
  startAIGame();
});
document.getElementById('btnCookie').addEventListener('click',()=>{
  sendToBot({action:'challenge'});
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('waitingOverlay').querySelector('h2').textContent='⏳ Вызов отправлен Cookie...';
  document.getElementById('waitingOverlay').classList.remove('hidden');
});
document.getElementById('btnChallenge').addEventListener('click',()=>{
  const id=parseInt(document.getElementById('challengeInput').value);
  if(!id||id<1)return;
  sendToBot({action:'challenge',user_anon_id:id});
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('waitingOverlay').querySelector('h2').textContent=`⏳ Вызов отправлен пользователю #${id}...`;
  document.getElementById('waitingOverlay').classList.remove('hidden');
});

// ─── Game loop ───
function startAIGame(){
  playerScore=0;aiScore=0;updateScore();
  playerY=H/2-PADDLE_H/2;aiY=H/2-PADDLE_H/2;
  resetBall();
  let val=3;
  document.getElementById('countdown').textContent='3';
  document.getElementById('countdown').classList.remove('hidden');
  const iv=setInterval(()=>{
    val--;
    if(val>0)document.getElementById('countdown').textContent=val;
    else{
      clearInterval(iv);
      document.getElementById('countdown').classList.add('hidden');
      gameRunning=true;gameStarted=true;
      gameLoop();
    }
  },800);
}

function resetBall(){
  ballX=W/2;ballY=H/2;bSpeed=SPEED_INIT;
  const angle=(Math.random()*0.8-0.4);
  const dir=Math.random()>0.5?1:-1;
  bVx=dir*Math.cos(angle)*bSpeed;
  bVy=Math.sin(angle)*bSpeed;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#30363d';ctx.lineWidth=2;ctx.setLineDash([8,8]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#58a6ff';
  if(side==='left')ctx.fillRect(20,playerY,PADDLE_W,PADDLE_H);
  else ctx.fillRect(W-20-PADDLE_W,playerY,PADDLE_W,PADDLE_H);
  ctx.fillStyle='#f85149';
  if(side==='left')ctx.fillRect(W-20-PADDLE_W,aiY,PADDLE_W,PADDLE_H);
  else ctx.fillRect(20,aiY,PADDLE_W,PADDLE_H);
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ballX,ballY,BALL_R,0,Math.PI*2);ctx.fill();
}

function update(){
  if(!gameRunning)return;
  if(isMultiplayer)return; // server handles physics
  ballX+=bVx;ballY+=bVy;
  if(ballY-BALL_R<0){ballY=BALL_R;bVy=-bVy}
  if(ballY+BALL_R>H){ballY=H-BALL_R;bVy=-bVy}
  if(ballX-BALL_R<20+PADDLE_W&&ballX-BALL_R>20&&ballY>playerY&&ballY<playerY+PADDLE_H){
    ballX=20+PADDLE_W+BALL_R;bVx=-bVx;
    bSpeed=Math.min(bSpeed+0.15,8);bVx=Math.sign(bVx)*bSpeed;
    const rel=(ballY-playerY)/PADDLE_H-0.5;bVy+=rel*1.5;
  }
  if(ballX+BALL_R>W-20-PADDLE_W&&ballX+BALL_R<W-20&&ballY>aiY&&ballY<aiY+PADDLE_H){
    ballX=W-20-PADDLE_W-BALL_R;bVx=-bVx;
    bSpeed=Math.min(bSpeed+0.15,8);bVx=Math.sign(bVx)*bSpeed;
    const rel=(ballY-aiY)/PADDLE_H-0.5;bVy+=rel*1.5;
  }
  if(ballX<0){aiScore++;updateScore();if(aiScore>=WIN_SCORE)endGame('ai');else resetBall()}
  if(ballX>W){playerScore++;updateScore();if(playerScore>=WIN_SCORE)endGame('player');else resetBall()}
  const aiSpeed=3.2;
  const aiTarget=bVy>0?ballY+PADDLE_H/4:ballY-PADDLE_H/4;
  if(Math.abs(aiTarget-aiY-PADDLE_H/2)>aiSpeed)aiY+=Math.sign(aiTarget-aiY-PADDLE_H/2)*aiSpeed;
  aiY=Math.max(0,Math.min(H-PADDLE_H,aiY));
  const pSpeed=5;
  if(Math.abs(targetPlayerY-playerY)>pSpeed)playerY+=Math.sign(targetPlayerY-playerY)*pSpeed;
  else playerY=targetPlayerY;
  playerY=Math.max(0,Math.min(H-PADDLE_H,playerY));
}

function handleMove(y){
  const rect=canvas.getBoundingClientRect();
  const scaleY=H/rect.height;
  targetPlayerY=(y-rect.top)*scaleY-PADDLE_H/2;
  targetPlayerY=Math.max(0,Math.min(H-PADDLE_H,targetPlayerY));
  if(isMultiplayer&&ws&&ws.readyState===WebSocket.OPEN){
    ws.send(JSON.stringify({type:'move',y:targetPlayerY}));
  }
}

canvas.addEventListener('touchstart',(e)=>{
  if(!gameStarted&&!isMultiplayer)startAIGame();
  e.preventDefault();handleMove(e.touches[0].clientY);
},{passive:false});
canvas.addEventListener('touchmove',(e)=>{
  e.preventDefault();handleMove(e.touches[0].clientY);
},{passive:false});
canvas.addEventListener('mousedown',(e)=>{
  if(!gameStarted&&!isMultiplayer)startAIGame();
  handleMove(e.clientY);
});
canvas.addEventListener('mousemove',(e)=>{if(e.buttons&1)handleMove(e.clientY)});

document.getElementById('closeBtn').addEventListener('click',()=>{if(tg)try{tg.close()}catch(e){}});

function gameLoop(){update();draw();if(gameRunning)requestAnimationFrame(gameLoop)}

draw();
</script>
</body>
</html>
